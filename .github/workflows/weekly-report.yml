name: Weekly Community Report

on:
  schedule:
    # 每周一 09:00 北京时区（UTC+8 = UTC 01:00）
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate report
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: node scripts/generate-report.js

      - name: Commit and push
        run: |
          git config user.name "Weekly Report Bot"
          git config user.email "bot@yoyo-creative-studio.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "chore: auto weekly report $(date +%Y-%m-%d)" && git push origin main)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          enable_jekyll: false
